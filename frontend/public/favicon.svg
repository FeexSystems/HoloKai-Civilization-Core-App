<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#D97706" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.0"/>
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="85%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="95%" stop-color="#D97706" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="220" r="200" fill="url(#glow)"/>

  <!-- Concentric rings (halo) -->
  <circle cx="256" cy="230" r="180" fill="none" stroke="#F59E0B" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="256" cy="230" r="160" fill="none" stroke="#F59E0B" stroke-opacity="0.12" stroke-width="1.2"/>
  <circle cx="256" cy="230" r="140" fill="none" stroke="#D97706" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="256" cy="230" r="120" fill="url(#halo)" stroke="#F59E0B" stroke-opacity="0.2" stroke-width="0.8"/>
  <circle cx="256" cy="230" r="100" fill="none" stroke="#F59E0B" stroke-opacity="0.1" stroke-width="0.6"/>

  <!-- Mannequin silhouette - head -->
  <ellipse cx="256" cy="155" rx="42" ry="50" fill="url(#bodyGrad)" opacity="0.95"/>

  <!-- Neck -->
  <rect x="240" y="200" width="32" height="30" rx="8" fill="url(#bodyGrad)" opacity="0.9"/>

  <!-- Torso -->
  <path d="M210 230 Q210 225 220 222 L292 222 Q302 225 302 230 L310 340 Q310 350 300 352 L212 352 Q202 350 202 340 Z"
        fill="url(#bodyGrad)" opacity="0.9"/>

  <!-- Left arm -->
  <path d="M210 235 Q195 240 185 260 L178 340 Q176 350 182 354 L192 354 Q198 352 200 345 L210 270 Z"
        fill="url(#bodyGrad)" opacity="0.85"/>

  <!-- Right arm -->
  <path d="M302 235 Q317 240 327 260 L334 340 Q336 350 330 354 L320 354 Q314 352 312 345 L302 270 Z"
        fill="url(#bodyGrad)" opacity="0.85"/>

  <!-- Left leg -->
  <path d="M220 350 L215 470 Q214 480 222 480 L234 480 Q240 480 239 470 L240 350 Z"
        fill="url(#bodyGrad)" opacity="0.8"/>

  <!-- Right leg -->
  <path d="M272 350 L277 470 Q278 480 270 480 L258 480 Q252 480 253 470 L252 350 Z"
        fill="url(#bodyGrad)" opacity="0.8"/>

  <!-- Subtle pattern lines on torso -->
  <g stroke="#F59E0B" stroke-opacity="0.15" stroke-width="0.5" fill="none">
    <path d="M225 250 Q256 245 287 250"/>
    <path d="M222 270 Q256 265 290 270"/>
    <path d="M220 290 Q256 285 292 290"/>
    <path d="M218 310 Q256 305 294 310"/>
    <path d="M216 330 Q256 325 296 330"/>
  </g>

  <!-- Eye slit -->
  <ellipse cx="256" cy="148" rx="18" ry="3" fill="#0a0a0a" opacity="0.6"/>
</svg>
